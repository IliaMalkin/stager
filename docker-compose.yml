name: stager

x-python-base: &python-base
  build:
    context: .
    dockerfile: apps/${SERVICE:-bot}/Dockerfile
  env_file: .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"
  restart: unless-stopped
  depends_on:
    postgres: { condition: service_healthy }
    redis: { condition: service_healthy }
    minio: { condition: service_healthy }

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"   # dev only, prod overrides

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  bot:
    build: { context: ., dockerfile: apps/bot/Dockerfile }
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    command: python -m apps.bot.main

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=2

  beat:
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    command: celery -A apps.worker.celery_app beat --loglevel=info

  web:
    build: { context: ./apps/web, dockerfile: Dockerfile }
    env_file: .env
    environment:
      INTERNAL_API_BASE: http://api:8000
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
  redisdata:
  miniodata:
