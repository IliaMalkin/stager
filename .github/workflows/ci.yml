name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stager
          POSTGRES_PASSWORD: stager
          POSTGRES_DB: stager_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U stager"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 3s --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://stager:stager@localhost:5432/stager_test
      REDIS_URL: redis://localhost:6379/0
      MIMO_API_KEY: test
      GOOGLE_API_KEY: test
      JWT_SECRET: test-secret-do-not-use
      TELEGRAM_BOT_TOKEN: "1:test"
      TELEGRAM_BOT_USERNAME: stager_test_bot
      MINIO_ROOT_USER: stager
      MINIO_ROOT_PASSWORD: stager
      MINIO_BUCKET: stager-test
      MINIO_ENDPOINT: http://localhost:9000
      LOG_LEVEL: WARNING
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy (packages + apps/api)
        run: mypy packages apps/api

      - name: Migrate
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q --cov=apps --cov=packages --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
